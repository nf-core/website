name: Social media auto-post
# Posts newly published blog posts & advisories, and upcoming events (the day
# before / day of), to Bluesky and Mastodon. The record of what has already been
# posted is kept in the Actions cache (S3-backed via RunsOn): each run restores
# the most recent log via the `social-posts-` prefix and saves an updated copy
# under a fresh, unique key (cache entries are immutable, so we never overwrite).
on:
  schedule:
    # Hourly: fast for blog/advisory, and catches the event day-before window
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print what would be posted without posting"
        type: boolean
        default: false
      seed:
        description: "Mark everything currently in the feed as already posted (run once at rollout)"
        type: boolean
        default: false

permissions: {}

jobs:
  social-post:
    runs-on:
      - runs-on=${{ github.run_id }}-social-post
      - runner=4cpu-linux-x64
      - extras=s3-cache
    if: github.repository == 'nf-core/website'
    permissions:
      contents: read
    steps:
      - name: Configure RunsOn S3 cache
        uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate cache key
        id: cache-key
        run: echo "value=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Restore & persist post log
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .social-cache
          key: social-posts-${{ steps.cache-key.outputs.value }}
          restore-keys: social-posts-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Post to social media
        env:
          BSKY_IDENTIFIER: nf-co.re
          BSKY_PASSWORD: ${{ secrets.FEED_TO_BLUESKY }}
          MASTODON_URL: https://mstdn.science
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          SEED: ${{ inputs.seed }}
        run: |
          mkdir -p .social-cache
          args=()
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          [ "$SEED" = "true" ] && args+=(--seed)
          node bin/social-post.js --log .social-cache/social-posts.json "${args[@]}"
