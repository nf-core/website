[functions]
external_node_modules = ["vscode-oniguruma","shiki"]
node_bundler = "esbuild"
[build]
environment = { NODE_VERSION = "22" }
command = "npm run build -w sites/pipeline-results"
ignore = "[ \"$CACHED_COMMIT_REF\" = \"$COMMIT_REF\" ] || git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF sites/main-site/src/components public/pipelines.json sites/pipeline-results" # don't build if there are no changes
[images]
remote_images = ["https://raw.githubusercontent.com/.*", "https://images.unsplash.com/.*", "https://avatars.githubusercontent.com/.*"]
[[headers]]
for = "/_astro/*"
[headers.values]
Access-Control-Allow-Origin = "*"
